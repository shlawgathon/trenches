services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: http://backend:8000
      VITE_VERCEL_API_BASE: /api
      VITE_ENABLE_SOURCE_LOGIC: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend
