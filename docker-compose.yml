services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_VERCEL_API_BASE: /api
      NEXT_PUBLIC_ENABLE_SOURCE_LOGIC: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
